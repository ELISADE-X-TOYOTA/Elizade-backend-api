[pytest]
testpaths = tests
pythonpath = .
addopts = -ra
filterwarnings =
    # FastAPI 0.115.x re-builds request-body models internally and mis-warns that
    # camelCase aliases "have no effect" — the aliases provably work (see tests).
    # Known upstream false positive; filter it so real warnings stay visible.
    ignore:.*alias.*has no effect.*:UserWarning
    # python-jose uses the deprecated datetime.utcnow() internally (not our code).
    ignore:datetime.datetime.utcnow.*:DeprecationWarning
